version: 1
action_types:
  - name: CaptureResearchSettings
    reads: []
    writes:
      - ResearchSettings
      - UserHypothesis
      - OutputView
      - DataGap
    required_checks:
      - settings_required_fields_present
      - user_hypotheses_marked_not_evidence
      - output_view_selected
  - name: StartResearchRun
    reads:
      - ResearchSettings
      - UserHypothesis
    writes:
      - ResearchRun
      - Company
      - Security
      - DataGap
    required_checks:
      - identity_resolved
      - security_resolved
      - source_classes_mapped
  - name: AttachSourceDocument
    reads:
      - Company
    writes:
      - SourceDocument
      - SourceSnapshot
    required_checks:
      - source_type_classified
      - freshness_status_set
      - source_snapshot_created
  - name: BuildSourcePartitions
    reads:
      - SourceSnapshot
      - SourceDocument
    writes:
      - SourcePartition
    required_checks:
      - document_sections_indexed
      - candidate_object_types_assigned
      - freshness_status_set
  - name: BuildEvidencePartitions
    reads:
      - SourcePartition
      - EvidenceItem
      - Claim
    writes:
      - EvidencePartition
    required_checks:
      - partition_metadata_complete
      - conflict_count_set
      - freshness_status_set
  - name: ExtractEvidence
    reads:
      - SourcePartition
      - SourceDocument
    writes:
      - EvidenceItem
      - Claim
    required_checks:
      - source_marker_present
      - materiality_set
  - name: NormalizeOperatingObjects
    reads:
      - EvidenceItem
      - Claim
      - MetricObservation
    writes:
      - CustomerCounterparty
      - ContractOrder
      - AssetFacility
      - DebtInstrument
      - DilutionInstrument
      - DataGap
    required_checks:
      - object_type_assigned
      - source_marker_preserved
      - materiality_set
      - valuation_usability_set_or_blocked
  - name: ClassifyClaim
    reads:
      - Claim
      - EvidenceItem
    writes:
      - Claim
    required_checks:
      - evidence_status_set
      - source_strength_set
  - name: ResolveConflictingFacts
    reads:
      - Claim
      - EvidenceItem
      - SourceDocument
    writes:
      - Claim
      - DataGap
      - ConflictResolution
    required_checks:
      - source_priority_applied
      - conflict_status_set
  - name: BuildBusinessModelThesis
    reads:
      - Claim
      - CustomerCounterparty
      - ContractOrder
      - AssetFacility
      - EvidenceItem
    writes:
      - BusinessModelThesis
      - ValueDriverTransition
      - DataGap
    required_checks:
      - customer_problem_named
      - value_capture_mechanism_named
      - value_driver_transition_named
      - verification_variable_named
  - name: DetectSourceChange
    reads:
      - SourceSnapshot
      - ResearchRun
    writes:
      - IncrementalRefreshPlan
      - DataGap
    required_checks:
      - changed_source_classified
      - affected_objects_identified
      - stale_objects_marked
  - name: IncrementalRefresh
    reads:
      - IncrementalRefreshPlan
      - EvidencePartition
    writes:
      - Claim
      - MetricObservation
      - ValuationCase
      - TechnicalSetup
      - ReportSection
      - ActionExecution
    required_checks:
      - only_dependent_objects_refreshed
      - stale_objects_marked
      - gates_rerun
  - name: GradeOrderQuality
    reads:
      - ContractOrder
      - EvidenceItem
    writes:
      - OrderQualityAssessment
    required_checks:
      - legal_strength_classified
      - valuation_usability_set
  - name: ReconcileFinancials
    reads:
      - MetricObservation
    writes:
      - FinancialQualityAssessment
      - DataGap
    required_checks:
      - ocf_net_income_reconciled
      - working_capital_explained
  - name: AnalyzeProfitCashFlowQuality
    reads:
      - MetricObservation
      - FinancialQualityAssessment
      - DebtInstrument
      - DilutionInstrument
      - Claim
    writes:
      - ProfitCashFlowQualityAnalysis
      - ShortRiskSignal
      - DataGap
    required_checks:
      - ocf_net_income_reconciled
      - ebitda_ocf_fcf_bridge_present
      - fcf_per_share_reconciled
      - sbc_and_dilution_addressed
      - valuation_and_short_risk_effect_named
  - name: ReconcileShareCountAndEV
    reads:
      - Security
      - MetricObservation
      - DebtInstrument
      - DilutionInstrument
    writes:
      - EquityBridge
      - ValuationCase
      - DataGap
    required_checks:
      - diluted_share_count_reconciled
      - net_debt_bridge_reconciled
  - name: InferCurrentMarketPricing
    reads:
      - Security
      - MetricObservation
      - Claim
    writes:
      - CurrentMarketImpliedBridge
    required_checks:
      - pricing_denominator_selected
      - fragile_assumption_named
  - name: SelectPrimaryValuationMethod
    reads:
      - Company
      - CurrentMarketImpliedBridge
      - FinancialQualityAssessment
      - ProfitCashFlowQualityAnalysis
    writes:
      - ValuationMethodSelection
    required_checks:
      - one_primary_method
      - secondary_check_limited
      - cash_flow_maturity_considered
  - name: BuildValuationCase
    reads:
      - ValuationMethodSelection
      - CurrentMarketImpliedBridge
      - MetricObservation
      - ProfitCashFlowQualityAnalysis
      - ContractOrder
      - DebtInstrument
      - DilutionInstrument
    writes:
      - ValuationCase
      - DataGap
    required_checks:
      - target_ev_present_or_blocked
      - equity_bridge_present_or_blocked
  - name: BuildEquityBridge
    reads:
      - Security
      - MetricObservation
      - DebtInstrument
      - DilutionInstrument
      - ValuationCase
    writes:
      - EquityBridge
      - DataGap
    required_checks:
      - diluted_share_count_reconciled
      - net_debt_bridge_reconciled
      - senior_claims_included_or_blocked
  - name: RunShortRiskScreen
    reads:
      - Claim
      - ContractOrder
      - FinancialQualityAssessment
      - ProfitCashFlowQualityAnalysis
      - DebtInstrument
      - DilutionInstrument
    writes:
      - ShortRiskSignal
      - ShortSellerAssessment
    required_checks:
      - grade_present
      - risk_effect_linked
  - name: ValidateTechnicalSetup
    reads:
      - MetricObservation
      - Claim
    writes:
      - TechnicalSetup
      - DataGap
    required_checks:
      - chart_date_present
      - adjusted_status_present
      - levels_supported_or_blocked
  - name: BuildDecisionScorecard
    reads:
      - BusinessModelThesis
      - ValueDriverTransition
      - OrderQualityAssessment
      - ProfitCashFlowQualityAnalysis
      - CurrentMarketImpliedBridge
      - ValuationMethodSelection
      - EquityBridge
      - ValuationCase
      - ShortSellerAssessment
      - TechnicalSetup
      - DataGap
    writes:
      - ExpectationRevisionAssessment
      - MomentumRegimeAssessment
      - ValuationOddsAssessment
      - RiskFilterAssessment
      - DecisionScorecard
      - DataGap
    required_checks:
      - action_grade_present
      - binding_cap_reason_present
      - no_numeric_score_average
      - blocked_objects_cap_grade
  - name: BuildTradePlan
    reads:
      - ValuationCase
      - EquityBridge
      - ShortSellerAssessment
      - TechnicalSetup
      - DecisionScorecard
      - DataGap
    writes:
      - TradePlan
      - DataGap
    required_checks:
      - stance_tied_to_valuation_and_risk
      - position_size_tied_to_evidence_quality_and_stop_distance
      - entry_stop_take_profit_present_or_blocked
      - invalidation_named
  - name: GenerateReportSection
    reads:
      - OutputView
      - Claim
      - EvidenceItem
      - ValuationCase
      - ShortSellerAssessment
      - TechnicalSetup
      - ProfitCashFlowQualityAnalysis
      - DecisionScorecard
      - TradePlan
      - DataGap
    writes:
      - ReportSection
    required_checks:
      - material_claims_cited
      - blocked_conclusions_marked
  - name: SelectOutputView
    reads:
      - ResearchSettings
      - ReportSection
      - DataGap
    writes:
      - OutputView
    required_checks:
      - view_projection_selected
      - graph_source_of_truth_preserved
      - omitted_sections_declared
  - name: FinalizeReport
    reads:
      - OutputView
      - ReportSection
      - DataGap
    writes:
      - Report
    required_checks:
      - all_sections_present
      - gates_passed_or_blocked
