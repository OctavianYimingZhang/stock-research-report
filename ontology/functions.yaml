version: 1
functions:
  - name: build_source_partition_index
    inputs:
      - source_snapshot
      - source_document
      - source_type
    output: source_partitions
    blocking_gaps:
      - source_not_sectioned
      - source_type_unresolved
      - freshness_unresolved
  - name: extract_material_metric
    inputs:
      - source_document
      - metric_name
      - period
    output: metric_observation
    blocking_gaps:
      - source_not_primary
      - period_unresolved
      - value_not_traceable
  - name: classify_claim_materiality
    inputs:
      - claim
      - evidence_item
    output: materiality_and_confidence
    blocking_gaps:
      - unsupported_high_materiality_claim
  - name: detect_source_conflict
    inputs:
      - claim
      - evidence_item
      - source_document
    output: conflict_status
    blocking_gaps:
      - unresolved_primary_source_conflict
  - name: extract_outside_thesis_path
    inputs:
      - outside_source_document
      - source_type
      - source_date
    output: article_thesis_map
    blocking_gaps:
      - outside_source_unavailable
      - thesis_path_not_extractable
      - source_date_unresolved
  - name: verify_outside_thesis_components
    inputs:
      - article_thesis_map
      - primary_source_claims
      - conflict_resolution
    output: thesis_path_replay
    blocking_gaps:
      - material_claim_not_primary_verified
      - contradiction_unresolved
  - name: route_opportunity_archetype
    inputs:
      - thesis_path_replay
      - business_model_claims
      - order_quality
      - asset_and_debt_profile
    output: opportunity_archetype
    blocking_gaps:
      - no_company_specific_route
      - unsupported_archetype
  - name: assess_demand_expansion
    inputs:
      - end_demand
      - spender_or_customer
      - why_now_evidence
    output: demand_expansion_assessment
    blocking_gaps:
      - end_demand_not_named
      - spender_not_identified
  - name: assess_scaling_difficulty
    inputs:
      - supply_expansion_path
      - qualification_barrier
      - capex_or_time_to_scale
    output: scaling_difficulty_assessment
    blocking_gaps:
      - scaling_barrier_not_supported
  - name: assess_scarcity_bottleneck
    inputs:
      - value_chain_node
      - company_control_or_benefit
      - replication_barrier
    output: scarcity_bottleneck_assessment
    blocking_gaps:
      - bottleneck_not_specific
      - company_link_to_scarcity_unverified
  - name: assess_commercialization_visibility
    inputs:
      - order_evidence_type
      - delivery_cadence
      - cash_conversion_path
    output: commercialization_path_assessment
    blocking_gaps:
      - commercial_evidence_too_weak
      - cash_conversion_path_unresolved
  - name: calculate_enterprise_value
    inputs:
      - market_cap
      - debt
      - preferred_stock
      - minority_interest
      - cash
    output: enterprise_value
    blocking_gaps:
      - missing_market_cap
      - missing_cash_or_debt
  - name: calculate_fcff
    inputs:
      - ebit
      - tax_rate
      - depreciation_and_amortization
      - capex
      - change_in_net_working_capital
    output: free_cash_flow_to_firm
    blocking_gaps:
      - missing_capex
      - missing_working_capital
  - name: calculate_fcfe
    inputs:
      - operating_cash_flow
      - capex
      - net_borrowing
    output: free_cash_flow_to_equity
    blocking_gaps:
      - unstable_leverage
      - missing_net_borrowing
  - name: risk_adjust_backlog_value
    inputs:
      - backlog
      - delivery_probability
      - expected_gross_margin
      - required_capex
      - required_working_capital
    output: risk_adjusted_backlog_value
    blocking_gaps:
      - weak_order_quality
      - missing_margin
  - name: build_order_to_revenue_bridge
    inputs:
      - order_evidence_type
      - customer_funding
      - delivery_cadence
      - available_capacity
      - expected_margin
      - working_capital_burden
    output: order_to_revenue_bridge
    blocking_gaps:
      - weak_order_quality
      - missing_delivery_cadence
      - capacity_not_reconciled
  - name: grade_order_quality
    inputs:
      - evidence_type
      - counterparty_confirmation
      - cancellation_terms
      - revenue_conversion_history
    output: order_quality_grade
    blocking_gaps:
      - unsupported_pipeline
  - name: cash_conversion_score
    inputs:
      - net_income
      - operating_cash_flow
      - working_capital_driver
    output: cash_conversion_score
    blocking_gaps:
      - missing_cash_flow_statement
  - name: calculate_cash_quality_bridge
    inputs:
      - net_income
      - ebitda
      - operating_cash_flow
      - capex
      - change_in_working_capital
      - stock_based_compensation
    output: profit_cash_flow_quality_bridge
    blocking_gaps:
      - missing_cash_flow_statement
      - missing_capex
      - missing_sbc
  - name: assess_working_capital_cycle
    inputs:
      - revenue
      - receivables
      - inventory
      - payables
      - contract_assets
      - deferred_revenue
    output: working_capital_cycle_assessment
    blocking_gaps:
      - missing_balance_sheet_detail
      - missing_revenue_period
  - name: calculate_sbc_adjusted_fcf_per_share
    inputs:
      - operating_cash_flow
      - maintenance_capex
      - stock_based_compensation
      - diluted_share_count
    output: sbc_adjusted_fcf_per_share
    blocking_gaps:
      - missing_sbc
      - missing_diluted_share_count
  - name: debt_safety_score
    inputs:
      - cash
      - total_debt
      - maturity_schedule
      - interest_cost
      - covenant_status
    output: debt_safety_score
    blocking_gaps:
      - missing_maturity_schedule
  - name: select_valuation_method
    inputs:
      - industry_archetype
      - market_pricing_mechanism
      - cash_flow_maturity
      - asset_intensity
    output: valuation_method_selection
    blocking_gaps:
      - no_defensible_denominator
  - name: build_re_rating_bridge
    inputs:
      - old_market_bucket
      - new_market_bucket
      - transition_evidence
      - current_implied_multiple
      - proof_event
    output: re_rating_bridge
    blocking_gaps:
      - missing_transition_evidence
      - current_implied_not_reconciled
  - name: build_funding_bridge
    inputs:
      - cash
      - expected_operating_cash_flow
      - customer_prepayments
      - grants_or_credits
      - committed_capex
      - working_capital_build
      - debt_maturities
    output: funding_surplus_or_gap
    blocking_gaps:
      - missing_capex_commitment
      - missing_cash_or_debt
      - unverified_customer_funding
  - name: detect_target_price_blockers
    inputs:
      - diluted_share_count
      - net_debt
      - order_quality_grade
      - cash_runway
    output: target_price_blockers
    blocking_gaps:
      - unreconciled_share_count
      - unreconciled_net_debt
      - weak_order_quality
  - name: calculate_equity_bridge
    inputs:
      - target_enterprise_value
      - cash
      - debt
      - preferred_stock
      - minority_interest
      - non_operating_assets
      - diluted_share_count
    output: equity_bridge
    blocking_gaps:
      - unreconciled_net_debt
      - unreconciled_share_count
      - missing_senior_claims
  - name: short_risk_grade
    inputs:
      - order_risk
      - cash_conversion_risk
      - governance_risk
      - dilution_risk
      - regulatory_risk
    output: short_seller_grade
    blocking_gaps:
      - missing_governance_data
  - name: build_falsification_lens
    inputs:
      - main_upside_thesis
      - order_conversion_evidence
      - cash_flow_quality
      - customer_concentration
      - policy_dependency
    output: falsification_lens
    blocking_gaps:
      - upside_thesis_not_named
  - name: build_decision_scorecard
    inputs:
      - business_model_thesis
      - profit_cash_flow_quality_analysis
      - valuation_case
      - short_seller_assessment
      - technical_setup
    output: decision_scorecard
    blocking_gaps:
      - missing_action_grade_inputs
  - name: determine_action_grade_cap
    inputs:
      - valuation_odds
      - risk_filter
      - momentum_regime
      - data_gaps
    output: binding_cap_reason
    blocking_gaps:
      - unresolved_binding_cap_reason
  - name: technical_freshness_check
    inputs:
      - chart_date
      - adjusted_status
      - data_source
    output: technical_freshness_status
    blocking_gaps:
      - stale_chart
      - unverified_levels
  - name: position_size_from_stop_distance
    inputs:
      - entry
      - stop
      - maximum_loss_budget
      - evidence_quality
    output: position_size
    blocking_gaps:
      - missing_stop
  - name: determine_gate_result
    inputs:
      - gate_name
      - pass_conditions
      - blocked_conclusions
    output: gate_result
    blocking_gaps:
      - gate_status_unresolved
  - name: select_output_view
    inputs:
      - research_settings
      - report_sections
      - data_gaps
    output: output_view
    blocking_gaps:
      - unsupported_output_view
