version: 1
object_types:
  - name: ResearchSettings
    purpose: User-selected runtime configuration for one research run.
    required_properties:
      - report_language
      - research_mode
      - output_view
      - source_policy
      - valuation_strictness
      - short_risk_threshold
      - technical_requirement
      - incremental_refresh_mode
      - user_risk_budget_or_gap
      - citation_detail_level
      - interaction_level
  - name: UserHypothesis
    purpose: User-provided thesis or concern to test against evidence.
    required_properties:
      - hypothesis_text
      - user_confidence
      - affected_sections
      - evidence_needed
      - status
  - name: ResearchRun
    purpose: Transaction-like record of one report generation or update.
    required_properties:
      - run_id
      - settings_id
      - company_id
      - run_started_at
      - input_sources
      - changed_sources
      - actions_executed
      - gates_failed
      - blocked_conclusions
      - output_report_id
  - name: ArticleThesisMap
    purpose: Outside thesis-path map used for discovery, not factual proof.
    required_properties:
      - source_title_or_locator
      - source_type
      - source_date_or_gap
      - thesis_summary
      - implied_causal_chain
      - claimed_catalysts
      - claimed_bottleneck
      - claimed_order_or_customer_proof
      - evidence_used_by_source
      - evidence_missing
      - unsupported_claims
      - falsification_test
      - usable_angle
      - verification_status
  - name: ThesisPathReplay
    purpose: Reconciliation of outside-in thesis discovery with inside-out primary-source reconstruction.
    required_properties:
      - outside_logic
      - primary_source_reconstruction
      - confirmed_components
      - rejected_components
      - unresolved_claims
      - improved_thesis
      - valuation_implications
      - action_grade_cap_or_gap
  - name: OpportunityArchetype
    purpose: Issuer route that determines report emphasis, evidence burden, and valuation method.
    required_properties:
      - archetype
      - route_evidence
      - section_emphasis
      - evidence_burden
      - valuation_method_implication
      - unsupported_route_gap
  - name: DemandExpansionAssessment
    purpose: Assessment of why end demand is growing and who is spending now.
    required_properties:
      - end_demand
      - spender_or_customer
      - why_now
      - structural_or_cyclical
      - evidence_status
  - name: ScalingDifficultyAssessment
    purpose: Assessment of why supply or execution capacity cannot expand easily.
    required_properties:
      - limiting_factor
      - barrier_type
      - time_to_scale_or_gap
      - required_capex_or_gap
      - evidence_status
  - name: ScarcityBottleneckAssessment
    purpose: Assessment of the scarce value-chain node and company link to it.
    required_properties:
      - value_chain_node
      - company_control_or_benefit
      - scarcity_type
      - scarcity_duration
      - replication_barrier
      - evidence_status
  - name: CommercializationPathAssessment
    purpose: Assessment of whether demand evidence can become revenue and cash.
    required_properties:
      - strongest_commercial_evidence
      - evidence_quality
      - delivery_cadence_or_gap
      - cash_conversion_path_or_gap
      - valuation_usability
  - name: Company
    purpose: Legal and operating identity of the issuer.
    required_properties:
      - legal_name
      - ticker
      - exchange
      - currency
      - fiscal_year
      - reporting_standard
      - industry_archetype
      - opportunity_archetype
  - name: Security
    purpose: Listed equity or listed equity equivalent being analyzed.
    required_properties:
      - ticker
      - exchange
      - share_class
      - currency
      - current_price
      - market_cap_date
  - name: SourceDocument
    purpose: Filing, transcript, presentation, regulator record, counterparty disclosure, or market-data source.
    required_properties:
      - source_type
      - issuer
      - date
      - period
      - locator
      - freshness_status
  - name: SourceSnapshot
    purpose: Immutable captured source state used in a research run.
    required_properties:
      - source_document_id
      - retrieval_date
      - source_locator
      - document_date
      - content_hash_or_gap
      - version_label_or_gap
      - freshness_status
  - name: SourcePartition
    purpose: Pre-extraction document slice for routing long sources before evidence extraction.
    required_properties:
      - source_snapshot_id
      - document_section
      - page_or_line_range_or_gap
      - source_type
      - period
      - candidate_object_type
      - candidate_metric_name_or_gap
      - freshness_status
      - estimated_materiality
  - name: EvidencePartition
    purpose: Post-extraction metadata slice for validated evidence and claims.
    required_properties:
      - company_id
      - fiscal_period
      - source_type
      - source_date
      - object_type
      - metric_name_or_gap
      - materiality
      - freshness_status
      - source_strength
      - claim_count
      - conflict_count
  - name: EvidenceItem
    purpose: Extracted evidence that can support, contradict, or qualify a claim.
    required_properties:
      - source_marker
      - source_class
      - date
      - confidence
      - materiality
      - text_excerpt_or_value
  - name: Claim
    purpose: Verifiable or inferential research statement used by analysis functions.
    required_properties:
      - claim_text
      - claim_type
      - evidence_status
      - source_strength
      - materiality
      - freshness_status
      - confidence
      - blocked_by_data_gap
  - name: ConflictResolution
    purpose: Record of how conflicting claims or metrics were resolved.
    required_properties:
      - conflict_id
      - conflicting_object_ids
      - selected_source_id
      - source_priority_reason
      - resolution_status
      - remaining_gap
  - name: MetricObservation
    purpose: One observed financial, operating, market, or technical metric.
    required_properties:
      - metric_name
      - value
      - unit
      - period
      - source_id
      - adjusted_status
  - name: BusinessModelThesis
    purpose: Causal explanation of customer problem, product, value capture, and bottleneck.
    required_properties:
      - industry_to_company_bridge
      - customer_problem
      - value_capture_mechanism
      - monetization_denominator
      - bottleneck
      - margin_mechanism
      - verification_variable
      - falsification_observable
  - name: ValueDriverTransition
    purpose: Old value driver to new value driver mapping.
    required_properties:
      - old_driver
      - new_driver
      - transition_evidence
      - failure_observable
  - name: OperatingLeverageMap
    purpose: Map from revenue or volume change to margin, cash flow, and valuation denominator.
    required_properties:
      - revenue_denominator
      - fixed_cost_base_or_gap
      - incremental_margin_or_gap
      - utilization_driver
      - cash_flow_conversion_effect
      - valuation_denominator
  - name: CustomerCounterparty
    purpose: Customer, supplier, partner, or government counterparty.
    required_properties:
      - name_or_disclosure_gap
      - counterparty_type
      - concentration
      - evidence_source
  - name: ContractOrder
    purpose: Revenue, purchase order, backlog, capacity reservation, framework, pilot, or pipeline item.
    required_properties:
      - evidence_type
      - amount_or_disclosure_gap
      - timing
      - cancellation_terms_or_gap
      - delivery_cadence_or_gap
      - customer_funding_or_gap
      - working_capital_burden_or_gap
      - valuation_usability
  - name: OrderQualityAssessment
    purpose: Grade of order evidence for valuation use.
    required_properties:
      - grade
      - conversion_evidence
      - delivery_capacity_match
      - margin_visibility
      - funding_support
      - haircut_required
  - name: AssetFacility
    purpose: Facility, mine, plant, equipment set, capacity asset, license, or restricted asset.
    required_properties:
      - asset_name
      - current_status
      - current_capacity
      - target_capacity
      - required_capex
      - contracted_status
      - ramp_bottleneck_or_gap
  - name: DebtInstrument
    purpose: Debt, lease, preferred security, note, or other senior claim.
    required_properties:
      - instrument_type
      - principal
      - maturity
      - interest_cost
      - covenant_or_gap
      - equity_bridge_effect
  - name: DilutionInstrument
    purpose: Warrant, convertible, preferred stock, ATM, or expected share issuance.
    required_properties:
      - instrument_type
      - potential_shares
      - trigger
      - target_price_effect
  - name: FinancialQualityAssessment
    purpose: Reconciliation of earnings quality, working capital, and cash conversion.
    required_properties:
      - ocf_vs_net_income
      - working_capital_driver
      - cash_conversion_score
      - accounting_risk_note
  - name: ProfitCashFlowQualityAnalysis
    purpose: Owner cash-flow quality analysis linking reported profit to OCF, FCF, SBC, capex, dilution, and valuation confidence.
    required_properties:
      - ocf_to_net_income_reconciliation
      - ebitda_to_ocf_to_fcf_bridge
      - fcf_margin_or_conversion
      - working_capital_cycle
      - capex_quality
      - maintenance_vs_growth_capex
      - sbc_adjusted_fcf
      - fcf_per_share
      - diluted_share_count_effect
      - rule_of_40_applicability
      - cash_quality_verdict
      - valuation_effect
      - short_risk_effect
  - name: CurrentMarketImpliedBridge
    purpose: What the current price or enterprise value already discounts.
    required_properties:
      - pricing_denominator
      - implied_metric_or_multiple
      - re_rating_bridge
      - fragile_assumption
      - analyst_difference
  - name: ValuationMethodSelection
    purpose: Selection of one primary valuation method and one sanity check at most.
    required_properties:
      - primary_method
      - selection_reason
      - secondary_check
      - blocked_methods
  - name: EquityBridge
    purpose: Explicit bridge from enterprise value to per-share equity value.
    required_properties:
      - starting_enterprise_value
      - cash_and_short_term_investments
      - debt
      - preferred_or_convertible_claims
      - minority_interest_or_gap
      - non_operating_assets_or_gap
      - target_equity_value
      - diluted_or_pro_forma_share_count
      - target_price_or_blocker
      - blocker_reason_or_gap
  - name: ValuationCase
    purpose: Bull, base, or bear valuation case linked to evidence and assumptions.
    required_properties:
      - case_type
      - primary_metric
      - selected_multiple_or_rate
      - current_implied_gap
      - re_rating_condition
      - funding_bridge
      - target_ev
      - target_equity_value
      - diluted_share_count
      - target_price_or_blocker
  - name: ShortRiskSignal
    purpose: Specific activist-short risk signal.
    required_properties:
      - signal_type
      - evidence_status
      - materiality
      - valuation_effect
  - name: ShortSellerAssessment
    purpose: A through F short-seller risk assessment.
    required_properties:
      - grade
      - attack_narrative
      - falsification_lens
      - strongest_red_flag
      - strongest_green_flag
      - valuation_or_size_effect
  - name: FalsificationPattern
    purpose: Monitorable evidence pattern that would disprove the main thesis.
    required_properties:
      - thesis_component
      - failure_signal
      - source_to_monitor
      - timing
      - valuation_or_trade_effect
  - name: TechnicalSetup
    purpose: K-line trend, pattern, levels, freshness, and invalidation setup.
    required_properties:
      - chart_date
      - adjusted_status
      - monthly_trend
      - weekly_trend
      - daily_trend
      - entry
      - stop
      - take_profit_1
      - take_profit_2
  - name: PositionSizingRationale
    purpose: Position size derived from evidence quality, scorecard cap, stop distance, and short-risk effect.
    required_properties:
      - evidence_quality
      - scorecard_cap
      - stop_distance
      - short_risk_effect
      - max_position_size_or_gap
  - name: ExpectationRevisionAssessment
    purpose: Assessment of whether financial and operating expectations are likely to revise up, revise down, or remain unconfirmed.
    required_properties:
      - revenue_revision_direction
      - earnings_or_cash_flow_revision_direction
      - order_or_guidance_revision_direction
      - catalyst_needed
      - source_status
  - name: MomentumRegimeAssessment
    purpose: Momentum regime derived from monthly, weekly, and daily technical setup plus volume and overextension.
    required_properties:
      - monthly_weekly_daily_alignment
      - overextension_status
      - volume_confirmation
      - technical_freshness_status
      - fundamental_confirmation_status
  - name: ValuationOddsAssessment
    purpose: Assessment of upside and downside odds after comparing current-implied expectations with the base case.
    required_properties:
      - current_implied_vs_base_case
      - upside_downside_asymmetry
      - primary_method_dependency
      - target_blocker_or_gap
      - valuation_odds_verdict
  - name: RiskFilterAssessment
    purpose: Assessment of whether short risk, balance sheet, dilution, cash quality, governance, or evidence gaps cap the action grade.
    required_properties:
      - short_seller_grade_effect
      - balance_sheet_constraint
      - cash_flow_quality_constraint
      - evidence_quality_constraint
      - binding_cap_reason
  - name: DecisionScorecard
    purpose: Report projection that compresses evidence-backed research objects into action grade and trade-plan constraint.
    required_properties:
      - company_quality
      - operating_trend
      - expectation_revision
      - growth_logic
      - momentum_state
      - valuation_odds
      - risk_filter
      - action_grade
      - binding_cap_reason
      - trade_plan_effect
  - name: TradePlan
    purpose: Final position and risk plan.
    required_properties:
      - stance
      - position_size
      - entry
      - stop
      - take_profit_1
      - take_profit_2
      - trim_or_add_plan
      - catalyst
      - invalidation
  - name: IncrementalRefreshPlan
    purpose: Dependency-aware plan for refreshing only affected research objects.
    required_properties:
      - changed_source_snapshot
      - affected_partitions
      - stale_objects
      - objects_to_recompute
      - gates_to_rerun
      - sections_to_update
      - fallback_to_full_rerun
  - name: ActionExecution
    purpose: Trace of one executed research action.
    required_properties:
      - action_name
      - run_id
      - input_object_ids
      - output_object_ids
      - gate_results
      - blocked_outputs
      - timestamp
      - error_or_gap
  - name: GateResult
    purpose: Normalized workflow-gate outcome attached to an action execution.
    required_properties:
      - gate_name
      - status
      - reason
      - affected_objects
      - blocked_conclusions
      - required_user_input
  - name: OutputView
    purpose: Projection mode for rendering the research graph.
    required_properties:
      - view_name
      - included_sections
      - omitted_sections
      - source_graph_id
      - projection_rules
  - name: DataGap
    purpose: Missing input that blocks a conclusion.
    required_properties:
      - missing_item
      - blocked_conclusion
      - required_source
      - severity
  - name: Report
    purpose: Final rendered output.
    required_properties:
      - company_id
      - generated_at
      - validation_status
  - name: ReportSection
    purpose: Section-level projection from the object graph.
    required_properties:
      - section_name
      - cited_claim_ids
      - cited_evidence_ids
      - blocked_status
