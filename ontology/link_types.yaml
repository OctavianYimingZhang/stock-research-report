version: 1
link_types:
  - name: configures_run
    from: ResearchSettings
    to: ResearchRun
    purpose: Runtime settings configure the research run without becoming evidence.
  - name: tests_hypothesis
    from: UserHypothesis
    to: Claim
    purpose: User hypothesis is tested by claims rather than treated as fact.
  - name: executes
    from: ResearchRun
    to: ActionExecution
    purpose: Research run records executed actions.
  - name: uses_snapshot
    from: ResearchRun
    to: SourceSnapshot
    purpose: Research run records immutable source snapshots used.
  - name: has_security
    from: Company
    to: Security
    purpose: Connects an issuer to the analyzed listed security.
  - name: disclosed_in
    from: Company
    to: SourceDocument
    purpose: Connects the issuer to source documents.
  - name: contains
    from: SourceDocument
    to: EvidenceItem
    purpose: Connects source documents to extracted evidence.
  - name: derives_from
    from: EvidenceItem
    to: SourceSnapshot
    purpose: Evidence is derived from an immutable source snapshot.
  - name: partitions_source
    from: SourcePartition
    to: SourceSnapshot
    purpose: Source partition indexes source snapshot sections before extraction.
  - name: routes_to_evidence
    from: SourcePartition
    to: EvidenceItem
    purpose: Source partition routes document slices to extracted evidence.
  - name: pruned_by_partition
    from: EvidencePartition
    to: EvidenceItem
    purpose: Partition metadata selects evidence for focused reasoning.
  - name: supersedes
    from: SourceSnapshot
    to: SourceSnapshot
    purpose: Newer source snapshot supersedes an older snapshot.
  - name: invalidates
    from: EvidenceItem
    to: Claim
    purpose: Evidence invalidates a previously usable claim.
  - name: supports
    from: EvidenceItem
    to: Claim
    purpose: Evidence supports a claim.
  - name: contradicts
    from: EvidenceItem
    to: Claim
    purpose: Evidence contradicts a claim.
  - name: qualifies
    from: EvidenceItem
    to: Claim
    purpose: Evidence limits or conditions a claim.
  - name: resolved_by
    from: ConflictResolution
    to: Claim
    purpose: Conflict resolution explains which claim remains usable.
  - name: feeds_business_model
    from: Claim
    to: BusinessModelThesis
    purpose: A claim contributes to business-model logic.
  - name: maps_value_driver
    from: Claim
    to: ValueDriverTransition
    purpose: A claim supports the old-driver to new-driver transition.
  - name: linked_to_order
    from: CustomerCounterparty
    to: ContractOrder
    purpose: A counterparty is linked to an order or demand signal.
  - name: grades_order
    from: OrderQualityAssessment
    to: ContractOrder
    purpose: An order-quality assessment grades a demand signal.
  - name: supports_valuation
    from: ContractOrder
    to: ValuationCase
    purpose: An order or demand signal supports a valuation case.
  - name: constrains_valuation
    from: OrderQualityAssessment
    to: ValuationCase
    purpose: Order quality constrains valuation confidence or haircut.
  - name: affects_equity_bridge
    from: DebtInstrument
    to: EquityBridge
    purpose: Senior claims affect target equity value.
  - name: affects_target_price
    from: DilutionInstrument
    to: EquityBridge
    purpose: Dilution affects per-share value.
  - name: refines_financial_quality
    from: ProfitCashFlowQualityAnalysis
    to: FinancialQualityAssessment
    purpose: Profit and cash-flow analysis deepens the earnings-quality assessment.
  - name: cash_quality_supports_valuation
    from: ProfitCashFlowQualityAnalysis
    to: ValuationCase
    purpose: Cash-flow quality supports, caps, or blocks valuation confidence.
  - name: cash_quality_flags_short_risk
    from: ProfitCashFlowQualityAnalysis
    to: ShortRiskSignal
    purpose: Weak cash conversion or per-share dilution becomes a short-risk signal when material.
  - name: bridges_to_target_price
    from: EquityBridge
    to: ValuationCase
    purpose: Equity bridge supports or blocks the per-share target.
  - name: discounts_valuation
    from: ShortRiskSignal
    to: ValuationCase
    purpose: Short-risk signals reduce multiple, confidence, or position size.
  - name: summarizes_short_risk
    from: ShortRiskSignal
    to: ShortSellerAssessment
    purpose: Specific signals roll up into the short-seller grade.
  - name: constrains_trade_plan
    from: TechnicalSetup
    to: TradePlan
    purpose: Technical setup constrains entry, stop, and take-profit.
  - name: expectation_feeds_scorecard
    from: ExpectationRevisionAssessment
    to: DecisionScorecard
    purpose: Revision assessment feeds the final action grade.
  - name: momentum_feeds_scorecard
    from: MomentumRegimeAssessment
    to: DecisionScorecard
    purpose: Momentum regime assessment feeds the final action grade.
  - name: valuation_odds_feeds_scorecard
    from: ValuationOddsAssessment
    to: DecisionScorecard
    purpose: Valuation odds assessment feeds the final action grade.
  - name: risk_filter_feeds_scorecard
    from: RiskFilterAssessment
    to: DecisionScorecard
    purpose: Risk filter assessment caps the final action grade.
  - name: scorecard_constrains_trade
    from: DecisionScorecard
    to: TradePlan
    purpose: Decision scorecard constrains stance, position size, and action grade.
  - name: valuation_constrains_trade
    from: ValuationCase
    to: TradePlan
    purpose: Valuation case constrains stance and reward-to-risk.
  - name: short_risk_constrains_trade
    from: ShortSellerAssessment
    to: TradePlan
    purpose: Short-risk assessment constrains position size and stance.
  - name: blocks_claim
    from: DataGap
    to: Claim
    purpose: A data gap blocks a claim or conclusion.
  - name: refreshed_by
    from: IncrementalRefreshPlan
    to: ActionExecution
    purpose: Incremental refresh plan is implemented through action executions.
  - name: executed_action
    from: ActionExecution
    to: ReportSection
    purpose: Report section records the action execution that produced it.
  - name: records_gate_result
    from: ActionExecution
    to: GateResult
    purpose: Action execution records normalized gate results.
  - name: projects_view
    from: OutputView
    to: ReportSection
    purpose: Output view projects selected report sections from the graph.
  - name: cites
    from: ReportSection
    to: EvidenceItem
    purpose: A report section cites evidence.
  - name: uses_claim
    from: ReportSection
    to: Claim
    purpose: A report section uses a claim.
