name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt
      - name: Run repository validation
        run: python3 scripts/validate.py
      - name: Run settings validation
        run: python3 scripts/validate_settings.py
      - name: Run contract validation
        run: python3 scripts/validate_contracts.py
      - name: Run report output contract validation
        run: python3 scripts/validate_report_output.py --view full_report evals/fixtures/report-contract-fixture.md
      - name: Run focused output view validation
        run: |
          python3 scripts/validate_report_output.py --view valuation_memo evals/fixtures/valuation_memo.md
          python3 scripts/validate_report_output.py --view short_seller_attack_memo evals/fixtures/short_seller_attack_memo.md
          python3 scripts/validate_report_output.py --view trade_plan_only evals/fixtures/trade_plan_only.md
          python3 scripts/validate_report_output.py --view scorecard_summary evals/fixtures/scorecard_summary.md
          python3 scripts/validate_report_output.py --view evidence_gap_report evals/fixtures/evidence_gap_report.md
          python3 scripts/validate_report_output.py --view source_conflict_report evals/fixtures/source_conflict_report.md
          python3 scripts/validate_report_output.py --view incremental_refresh_summary evals/fixtures/incremental_refresh_summary.md
      - name: Run research manifest validation
        run: python3 scripts/validate_research_manifest.py evals/fixtures/report-contract-fixture.manifest.json
      - name: Run report-manifest validation
        run: python3 scripts/validate_report_against_manifest.py evals/fixtures/report-contract-fixture.md evals/fixtures/report-contract-fixture.manifest.json
