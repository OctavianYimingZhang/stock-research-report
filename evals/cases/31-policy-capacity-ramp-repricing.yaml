id: policy-capacity-ramp-repricing
style_case: t1_style_policy_capacity_ramp
archetype: customer_funded_capacity_ramp
mispricing_archetype: policy_protected_scarcity
expected_primary_valuation: capacity_ramp_to_ebitda_with_policy_support
required_sections:
  - Core Conclusion
  - Why This Stock Exists Now
  - Industry Chain And Bottleneck
  - Company Position In The Chain
  - Business Model Logic
  - Scarcity And Moat Assessment
  - Customers, Orders, And Commercialization Path
  - Operations, Capacity, And Execution Quality
  - Financial Quality, Assets, Debt, And Dilution
  - Valuation And Market-Implied Expectation
  - Catalysts, Risks, And Falsification
  - Technical Structure And Trade Plan
required_checks:
  - thesis_spine
  - operating_machine_table
  - catalyst_linked_trade_plan
  - broken_thesis_case
must_include:
  - 45X / FEOC policy mechanism
  - G1/G2 capacity ramp
  - offtake / deferred revenue / customer deposit ladder
  - funding bridge
  - 2027 EBITDA valuation bridge
  - policy and capex failure signals
must_block:
  - EBITDA target without capacity/funding/offtake proof
forbidden:
  - capacity_without_customer_or_policy_proof
  - trade_plan_without_catalyst_link
