id: working-capital-deterioration
archetype: working_capital_deterioration_caps_valuation
expected_primary_valuation: valuation_discounted_until_working_capital_normalizes
required_sections:
  - Core Conclusion
  - Why This Stock Exists Now
  - Industry Chain And Bottleneck
  - Company Position In The Chain
  - Business Model Logic
  - Scarcity And Moat Assessment
  - Customers, Orders, And Commercialization Path
  - Operations, Capacity, And Execution Quality
  - Financial Quality, Assets, Debt, And Dilution
  - Valuation And Market-Implied Expectation
  - Catalysts, Risks, And Falsification
  - Technical Structure And Trade Plan
required_checks:
  - working_capital_cycle_analysis
  - dso_dio_dpo_review
  - cash_conversion_reconciliation
  - short_seller_grade
  - one_primary_valuation_method
  - decision_scorecard_action_grade
  - binding_cap_reason
forbidden:
  - revenue_growth_without_receivables_inventory_review
  - valuation_multiple_expansion_despite_unexplained_ocf_shortfall
  - numeric_score_average
