id: falsification-lens-trim-plan
archetype: falsification_lens_trim_plan
expected_primary_valuation: trade_size_capped_until_thesis_survives_falsification_tests
required_sections:
  - Core Conclusion
  - Why This Stock Exists Now
  - Industry Chain And Bottleneck
  - Company Position In The Chain
  - Business Model Logic
  - Scarcity And Moat Assessment
  - Customers, Orders, And Commercialization Path
  - Operations, Capacity, And Execution Quality
  - Financial Quality, Assets, Debt, And Dilution
  - Valuation And Market-Implied Expectation
  - Catalysts, Risks, And Falsification
  - Technical Structure And Trade Plan
required_checks:
  - short_seller_grade
  - falsification_lens
  - monitoring_item_named
  - one_primary_valuation_method
  - technical_entry_stop_tp
  - trim_or_add_plan
  - decision_scorecard_action_grade
  - binding_cap_reason
forbidden:
  - upside_thesis_without_failure_pattern
  - full_size_position_without_trim_or_add_logic
  - numeric_score_average
