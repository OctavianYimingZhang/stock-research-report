id: frontier-order-quality
archetype: early_commercialization_frontier
expected_primary_valuation: risk_adjusted_backlog_or_forward_revenue_scenario
required_sections:
  - Core Conclusion
  - Why This Stock Exists Now
  - Industry Chain And Bottleneck
  - Company Position In The Chain
  - Business Model Logic
  - Scarcity And Moat Assessment
  - Customers, Orders, And Commercialization Path
  - Operations, Capacity, And Execution Quality
  - Financial Quality, Assets, Debt, And Dilution
  - Valuation And Market-Implied Expectation
  - Catalysts, Risks, And Falsification
  - Technical Structure And Trade Plan
required_checks:
  - contract_quality_hierarchy
  - recognized_revenue_po_backlog_distinction
  - cash_runway_and_dilution
  - governance_and_promotion_screen
  - one_primary_valuation_method
  - short_seller_grade
  - technical_entry_stop_tp_or_observe
forbidden:
  - mou_or_pilot_as_valuation_denominator
  - probability_weighted_method_average
  - unverified_customer_claim
