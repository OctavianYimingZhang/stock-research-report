version: 1
gates:
  ArticleMapGate:
    required_when: source_policy.outside_thesis_replay != disabled
    blocks:
      - unsupported outside thesis used as fact
      - outside thesis has no missing-evidence list
  OpportunityRouteGate:
    required_when: output_view != source_conflict_report
    blocks:
      - no company-specific route for a high-conviction conclusion
  AlphaDiscoveryGate:
    required_when: output_view == full_report
    blocks:
      - no mispricing thesis for a high-conviction conclusion
      - no thesis spine connecting evidence to trade action
      - no broken-thesis signal
  MechanismGate:
    required_when: thesis_depends_on_technical_policy_or_supply_chain_mechanism
    blocks:
      - mechanism primer does not explain old system, bottleneck, customer pain, and issuer control point
      - company control point is thematic and not issuer-specific
  FourPartOpportunityGate:
    required_when: high_conviction_conclusion
    checks:
      - demand_expansion
      - scaling_difficulty
      - scarcity_bottleneck
      - commercialization_visibility
  SourcePriorityGate:
    required_when: always
    blocks:
      - secondary commentary overrides primary source
      - material claim lacks evidence or explicit data gap
  EquityBridgeGate:
    required_before:
      - target price
      - price target
    blocks:
      - unresolved share count
      - unresolved net debt
      - unresolved senior claims
  CashFlowQualityGate:
    required_before:
      - valuation_case
      - action_grade
    checks:
      - EBITDA_to_OCF_to_FCF
      - working_capital
      - capex
      - SBC_adjusted_FCF
      - FCF_per_share
  TechnicalFreshnessGate:
    required_before:
      - trade_plan
    blocks:
      - stale chart drives entry stop or take-profit levels
      - adjusted status missing when adjustment matters
  DecisionScorecardGate:
    required_before:
      - final_action_grade
    checks:
      - action_grade
      - binding_cap_reason
      - position_size_effect
  RevisionBridgeGate:
    required_when: thesis_depends_on_revenue_EPS_EBITDA_or_FCF_revision
    checks:
      - current_market_implied_or_consensus_baseline
      - revision_variable
      - timing
      - disconfirming_signal
  AssetFinancingPlatformGate:
    required_when: thesis_depends_on_subscription_fleet_tax_credit_or_project_finance
    blocks:
      - management asset value is used without waterfall
      - management cash generation is used without GAAP or cash bridge
      - non-recourse debt and parent recourse exposure are mixed
      - valuation relies on subscription value without monetization path
  ManagementMetricGate:
    required_when: decision_critical_management_metric
    blocks:
      - management metric is used as valuation denominator without reconciliation
      - common-stockholder EPS differs materially from consolidated economics and is not explained
      - cash generation is negative but treated as timing without next proof date
  FinancingCadenceGate:
    required_when: financing_recovery_or_project_finance_timing_is_thesis_critical
    blocks:
      - financing recovery thesis exists but no transaction ledger
      - delayed project finance is described as timing without next proof event
  PolicyMonetizationGate:
    required_when: policy_credit_or_tax_credit_monetization_drives_value
    blocks:
      - policy credit is treated as cash without monetization proof
      - policy-protected demand is assumed without procurement, eligibility, funding, or transfer mechanism
  CatalystLinkedTradeGate:
    required_before:
      - trade_plan
    checks:
      - catalyst_or_proof_event
      - price_level
      - action
      - invalidation
  ActionTriggerGate:
    required_before:
      - final_trade_plan
    blocks:
      - trade plan says wait but no add trim stop trigger
      - price levels exist without catalyst linkage
      - position size is not linked to evidence quality
